</head>

<div class="report-content">
<h1>a-stock-data 项目全面调研报告</h1>
<div class="meta-block">
  <strong>调研日期</strong>：2026-05-13<br>

<h2>一、项目概述</h2>
<h3>1.1 定位</h3>
<p>a-stock-data 是一个面向中国 A 股市场的<strong>全栈数据工具包</strong>，以 Claude Code Skill（<code>SKILL.md</code>）的形式发布。将分散在 8 个公开数据源的 A 股原始数据封装为 AI 编程助手可直接调用的 21 个数据端点。核心卖点：<strong>零 API Key（7/8 源免费）、六层架构、开箱即用</strong>。</p>

<h3>3.2 关键设计决策</h3>
<ul>
<li><strong>mootdx TCP 作为行情主通道</strong> — 不走 HTTP，直接 TCP 二进制协议连接通达信服务器（端口 7709），无 HTTP 开销、无限流</li>

<tr><td><strong>Joyce（策略 A）</strong></td><td>VCP 价值龙头趋势</td><td>市场温度计→仓位上限；赛道白名单+龙头过滤→候选池 TopN</td></tr>
<tr><td><strong>Brooks（策略 B）</strong></td><td>裸K价格行为</td><td>结构三态；High1/High2 信号+止损规则；强调尾盘确认</td></tr>
</table>

<h2>三、四大场景流程</h2>

<h3>场景 01：盘前计划（Plan）</h3>
<p><strong>触发时机</strong>：开盘前（如早 8:30）</p>
<pre><code>DataHub 增量拉取 + 缓存落库（去重/补缺/质量检查）
    ↓
策略 Agent A (Joyce)：
  市场温度计 → 今日仓位上限
  赛道白名单 + 龙头过滤 → 候选池 TopN
  盘前执行纪律
    ↓
策略 Agent B (Brooks)：
  趋势/区间/反转三态判断
  High1/High2 信号 + 止损规则
    ↓
主调度 Agent：
  合并多方结论 → 一页纸
  声明数据截止点 & 不可得项</code></pre>

<p><strong>输出</strong>（飞书推送）：</p>
<ol>
<li>今日市场假设（宏观情绪/板块轮动）</li>
<li>候选池 TopN（每只标的 3 条进池理由）</li>
<li>持仓纪律/仓位上限</li>
<li>观察阈值与风险清单</li>
</ol>

<h3>场景 02：盘中盯盘（Observe）</h3>
<p><strong>触发时机</strong>：低频，仅阈值触发，默认静默</p>
<pre><code>调度器：按市场时段低频巡检
  A股 开盘/尾盘加密，其余 5-15 分钟
  港/美：更低频（节省额度）
    ↓
规则引擎：只判断"触发/不触发"
  涨跌幅阈值 | 连续异动 | 量能突变 | 重大事件
    ↓
降噪模块（硬规则）：
  合并窗口 15 分钟（同标的多次触发合并）
  单日上限 N 条（如 5 条）
  只输出"触发项"，不刷常规状态</code></pre>

<p><strong>输出</strong>：触发类型 | 标的 | 触发依据（价位/阈值/时间） | 建议动作</p>

<h3>场景 03：盘后复盘（Review）</h3>
<p><strong>触发时机</strong>：收盘后（如 15:30）</p>
<pre><code>DataHub 入库 + 派生指标：
  收益/回撤/振幅/趋势强弱/量价结构等
  写入 bars_daily / daily_basic / signals
    ↓
策略复盘 — Joyce + Brooks 双视角：
  Joyce：主线/龙头/仓位纪律是否执行到位
  Brooks：结构三态 + 信号是否确认（尾盘）
    ↓
质量门控：
  若数据缺失/延迟 → 报告降级并标注"仅供参考"
  若盘中误报 → 更新阈值/合并策略/观察池</code></pre>

<p><strong>输出</strong>：市场复盘 | 持仓复盘 | 候选池更新 | 明日计划 | 风险清单</p>

<h3>场景 04：选股与题材挖掘（Discovery）</h3>
<p><strong>触发时机</strong>：周末或行情平淡时段，非每日强制</p>
<pre><code>第一层：可交易 & 可研究
  剔除：ST/停牌/流动性差/财务异常
  保留：成交额/市值/行业符合门槛
    ↓
第二层：策略打分（多维度）
  VCP/趋势强度：缩量回调、关键均线、波动收缩
  基本面/预期：业绩预告、估值合理性、确定性信号
  风险：高位放量滞涨、补涨龙、跌破结构位
    ↓
第三层：生成"研究任务"
  对 TopN 标的：产出研究提纲/关键问题/验证清单
  可选：一键调用 upstream 深研</code></pre>

<h2>四、核心设计亮点</h2>

<h3>4.1 降噪优先设计</h3>
<p>系统在盘中明确内置"降噪模块"，以硬规则限制推送频次：合并窗口 15 分钟、单日上限 N 条、只输出触发项。<strong>保护注意力是核心约束之一</strong>，而非事后优化。</p>

<h3>4.2 数据质量门控</h3>
<p>Review 场景明确引入质量门控节点：数据缺失/延迟 → 报告自动降级并标注；盘中误报 → 触发参数更新（而非静默接受）。<strong>"把系统变好"写进流程</strong>，质量改进是每日必须项。</p>

<h3>4.3 双视角策略设计</h3>
<p>Joyce（趋势/基本面/中长线）vs. Brooks（价格行为/结构/短线）不做合并，各自输出独立结论，最终由主调度 Agent 合并。避免了单一策略的盲点，同时保留两种视角的完整性。</p>

<h3>4.4 推送即落盘</h3>
<p>每次飞书推送同步写入本地（watchlist / signals / run_logs），保证可回溯、可迭代、可审计。Discovery 场景的候选池可与上周对比，支持持续迭代。</p>

<h2>七、结论</h2>
<p>这套参考架构最大的价值不在于技术复杂度（技术栈相对简单），而在于<strong>流程设计的完整性与纪律性</strong>：</p>
<ul>
<li><strong>完整闭环</strong>：选股 → 计划 → 盯盘 → 复盘 → 迭代，每个场景都有明确的输入/输出/落盘</li>
<li><strong>纪律内化</strong>：降噪、质量门控、执行纪律不依赖人的自律，而是写进系统规则</li>
<li><strong>轻量可执行</strong>：没有过度工程化，以飞书推送为交互界面，极低操作成本</li>
</ul>
<p>StockPulse 已具备数据采集、AI 分析、模拟交易的能力，但缺少<strong>场景编排层</strong>。引入 Plan/Observe/Review/Discovery 四场景框架，是当前阶段最值得借鉴的单点改进。</p>

let current = 0;

function show(idx) {
  current = idx;
  const r = REPORTS[idx];

  // Update sidebar
  document.querySelectorAll('.report-card').forEach((c, i) => {
    c.classList.toggle('active', i === idx);
  });

  // Update dots
  document.querySelectorAll('.dot').forEach((d, i) => {
    d.classList.toggle('active', i === idx);
    d.classList.toggle('done', i < idx);
  });
  document.getElementById('progress-label').textContent = (idx + 1) + ' / ' + REPORTS.length;

  // Update topbar
  document.getElementById('tb-num').textContent = r.num;
  document.getElementById('tb-title').textContent = r.title;
  document.getElementById('tb-date').textContent = r.date;

  // Update content
  const content = document.getElementById('content');
  content.innerHTML = r.content;
  content.scrollTop = 0;
}

// Keyboard navigation
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
    if (current < REPORTS.length - 1) show(current + 1);
  } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
    if (current > 0) show(current - 1);
  }
});

// Init
show(0);
</script>
